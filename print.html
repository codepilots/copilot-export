<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Print Copilot Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
    }

    #toolbar {
      flex-shrink: 0;
      height: 44px;
      background: #0f6cbd;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      font-size: 13px;
    }

    #toolbar span { flex: 1; }

    #toolbar button {
      background: #fff;
      color: #0f6cbd;
      border: none;
      padding: 7px 16px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    #toolbar button:hover { background: #e0eef8; }

    #frame {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }

    #loading {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #666;
    }

    @media print {
      #toolbar { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <span>Copilot Chat — Print Preview</span>
    <button id="printBtn">🖨 Print / Save as PDF</button>
  </div>
  <div id="loading">Loading chat…</div>
  <iframe id="frame" title="Chat preview" sandbox="allow-same-origin"></iframe>
  <script src="print.js"></script>
</body>
</html>
